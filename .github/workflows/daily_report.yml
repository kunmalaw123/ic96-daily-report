name: IC96 Daily Report

on:
  schedule:
    - cron: '0 1 * * 1-6'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send LINE report
        run: python trello_line_notify.py
