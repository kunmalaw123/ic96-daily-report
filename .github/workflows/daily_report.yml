name: IC96 Daily Report
on:
  workflow_dispatch:
jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      LINE_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_GID:   ${{ secrets.LINE_GROUP_ID }}
      TKEY:       ${{ secrets.TRELLO_KEY }}
      TTOK:       ${{ secrets.TRELLO_TOKEN }}
      BID:        ${{ secrets.BOARD_ID }}
    steps:
      - name: Run bot
        run: |
          pip install requests -q
          python3 - << 'EOF'
          import requests, os
          from datetime import datetime
          LT=os.environ["LINE_TOKEN"]; LG=os.environ["LINE_GID"]
          TK=os.environ["TKEY"]; TT=os.environ["TTOK"]; BI=os.environ["BID"]
          def fl():
            d=requests.get(f"https://api.trello.com/1/boards/{BI}/lists",params={"key":TK,"token":TT,"fields":"id,name,closed","filter":"all"}).json()
            return {l["id"]:l["name"] for l in d},[l["id"] for l in d if not l.get("closed")]
          def fc():
            return [c for c in requests.get(f"https://api.trello.com/1/boards/{BI}/cards",params={"key":TK,"token":TT,"fields":"id,name,idList,labels,dueComplete","filter":"open"}).json() if not c.get("dueComplete")]
          def fch():
            d={}
            for cl in requests.get(f"https://api.trello.com/1/boards/{BI}/checklists",params={"key":TK,"token":TT,"fields":"idCard,checkItems","checkItems":"all","checkItem_fields":"name,state"}).json():
              items=[i["name"] for i in cl.get("checkItems",[]) if i.get("state")!="complete"]
              if items: d.setdefault(cl["idCard"],[]).extend(items)
            return d
          def bld(cards,ld,cl):
            nm,ids=ld; today=datetime.now().strftime("%d/%m/%Y")
            em={"red":"\U0001f534","orange":"\U0001f7e0","yellow":"\U0001f7e1","green":"\U0001f7e2","blue":"\U0001f535","purple":"\U0001f7e3"}
            s=set(ids); bl={i:[] for i in ids}
            [bl[c["idList"]].append(c) for c inh cards if c["idList"] in s]
            active=[(i,bl[i]) for i in ids if bl[i]]
            lines=[f"\U0001f4cb รายงานงานค้าง {today}",f"รวม {sum(len(v) for _,v in active)} งาน / {len(active)} โปรเจค"]
            for lid,pc in active:
              lines+=["\n"+"─"*22,f"\U0001f4cc {nm.get(lid,lid)} ({len(pc)} งาน)"]
              for c in pc:
                lbl=(em.get(c["labels"][0].get("color",""),"")+" ") if c.get("labels") else ""
                lines.append(f"  {lbl}{c['name']}")
                [lines.append(f"    - {i}") for i in cl.get(c["id"],[])]
            return "\n".join(lines)
          r=requests.post("https://api.line.me/v2/bot/message/push",headers={"Authorization":f"Bearer {LT}","Content-Type":"application/json"},json={"to":LG,"messages":[{"type":"text","text":"$ "+bld(fc(),fl(),fch())[:4890],"mentionees":[{"index":0,"length":1,"type":"all"}]}]})
          print("OK" if r.status_code==200 else f"FAIL {r.status_code} {r.text}")
          EOF
